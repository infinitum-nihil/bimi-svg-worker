name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Run integration tests
        run: node --experimental-strip-types test/run.ts
      - name: Wrangler dry-run (verify Worker builds)
        run: npx wrangler deploy --dry-run --outdir=dist
